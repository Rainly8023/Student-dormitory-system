server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dorm_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root        # ⚠️ 修改为你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update    # 首次运行自动建表；上线后改为 validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  sql:
    init:
      mode: always        # 启动时执行 data.sql 写入初始数据

app:
  jwt:
    secret: dorm-system-jwt-secret-key-must-be-at-least-256-bits-long-2024
    expiration: 86400000  # 24小时 (ms)

logging:
  level:
    com.dorm: info
    org.hibernate.SQL: warn
