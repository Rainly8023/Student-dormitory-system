server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    # 从环境变量读取（docker-compose 注入）
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dorm_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always

app:
  jwt:
    secret: dorm-system-jwt-secret-key-must-be-at-least-256-bits-long-2024
    expiration: 86400000

logging:
  level:
    com.dorm: info
