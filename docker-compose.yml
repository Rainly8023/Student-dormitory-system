services:
  mysql:
    image: mysql:8.0
    container_name: dorm-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: dorm_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dorm-network

  backend:
    build: ./backend
    container_name: dorm-backend
    restart: always
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dorm_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
    ports:
      - "8080:8080"
    networks:
      - dorm-network

  frontend:
    build: ./frontend
    container_name: dorm-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dorm-network

volumes:
  mysql-data:

networks:
  dorm-network:
    driver: bridge